# Nexus Cooling Proxy — nginx config
# Validates package age before forwarding to real Nexus
#
# NEXUS_HOST is set via environment variable and substituted at container startup

resolver 8.8.8.8 valid=30s;

upstream validator {
    server validator:8080;
    keepalive 16;
}

server {
    listen 80;
    server_name localhost;

    # ── Health checks (no validation) ─────────────────────────────
    location /health {
        return 200 "ok\n";
    }

    # ── Nexus UI and API (pass through, no validation) ────────────
    location /service/ {
        proxy_pass https://${NEXUS_HOST};
        proxy_set_header Host ${NEXUS_HOST};
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Hosted repos (no validation — internal artifacts) ─────────
    # Only skip validation for repos that are explicitly hosted (not proxies)
    # Customize the pattern to match your hosted repo naming convention
    location ~ ^/repository/(hosted-) {
        proxy_pass https://${NEXUS_HOST};
        proxy_set_header Host ${NEXUS_HOST};
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Proxy repos (VALIDATED — cooling period enforced) ─────────
    location /repository/ {
        # Call the validator before forwarding
        auth_request /auth_validate;
        auth_request_set $auth_status $upstream_status;

        # If validator returns 403, show the block reason
        error_page 403 = @blocked;

        proxy_pass https://${NEXUS_HOST};
        proxy_set_header Host ${NEXUS_HOST};
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Large packages
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 500m;
    }

    # ── Validation subrequest ─────────────────────────────────────
    location = /auth_validate {
        internal;
        proxy_pass http://validator/validate;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Cooling-Bypass $http_x_cooling_bypass;

        # Fast timeout — don't slow down if validator is down
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;

        # If validator is unreachable, ALLOW (fail-open)
        proxy_intercept_errors on;
        error_page 502 503 504 = @allow_on_error;
    }

    # ── Fail-open: if validator is down, allow the request ────────
    location @allow_on_error {
        proxy_pass https://${NEXUS_HOST};
        proxy_set_header Host ${NEXUS_HOST};
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Blocked response ──────────────────────────────────────────
    location @blocked {
        default_type text/plain;
        return 403 "BLOCKED by Nexus Cooling Proxy.\nThis package is either too new or permanently blocked by policy.\nIf this is urgent, contact your admin for a bypass token.\n";
    }
}
