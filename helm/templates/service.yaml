apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    app: nexus-cooling-proxy
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: nexus-cooling-proxy
---
{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-redis
  labels:
    app: nexus-cooling-proxy-redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    app: nexus-cooling-proxy-redis
{{- end }}
